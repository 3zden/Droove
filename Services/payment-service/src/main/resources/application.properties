spring.application.name=payment-service
server.port=8105

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/droove}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=payments_svc

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP:localhost:9094}
spring.kafka.consumer.group-id=payment-service
