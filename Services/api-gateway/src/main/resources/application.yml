spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origin-patterns:
                  - "http://localhost:5173"
                  - "exp://*"
                allowed-methods: "*"
                allowed-headers: "*"
          routes:
            - id: users
              uri: ${USER_SERVICE_URL:http://localhost:8101}
              predicates: [ Path=/api/users/** ]
            - id: trips
              uri: ${TRIP_SERVICE_URL:http://localhost:8102}
              predicates: [ Path=/api/trips/** ]
            - id: matching
              uri: ${MATCHING_SERVICE_URL:http://localhost:8103}
              predicates: [ Path=/api/matching/** ]
            - id: pricing
              uri: ${PRICING_SERVICE_URL:http://localhost:8104}
              predicates: [ Path=/api/pricing/** ]
            - id: payments
              uri: ${PAYMENT_SERVICE_URL:http://localhost:8105}
              predicates: [ Path=/api/payments/** ]
            - id: bookings
              uri: ${SCHEDULING_SERVICE_URL:http://localhost:8106}
              predicates: [ Path=/api/bookings/** ]
            - id: ws-location
              uri: ${LOCATION_GATEWAY_URL:http://localhost:8201}
              predicates: [ Path=/ws/location,/ws/track/** ]
            - id: ws-notifications
              uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8202}
              predicates: [ Path=/ws/notifications ]

server:
  port: 8080
