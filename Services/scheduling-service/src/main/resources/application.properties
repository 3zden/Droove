spring.application.name=scheduling-service
server.port=8106

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/droove}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=scheduling_svc

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP:localhost:9094}
